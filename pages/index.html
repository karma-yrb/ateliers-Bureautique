<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ateliers Bureautique</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #19212a;
      --muted: #5d6673;
      --line: #d9dee6;
      --paper: #f7f4ef;
      --panel: #ffffff;
      --word: #285aa8;
      --excel: #217a4b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.5;
    }

    .atelier-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 32px;
    }

    .atelier-link {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 180px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      background: var(--panel);
    }

    .atelier-link:focus,
    .atelier-link:hover {
      outline: 3px solid rgba(25, 33, 42, 0.16);
      outline-offset: 3px;
    }

    .atelier-name {
      display: block;
      font-size: 1.7rem;
      font-weight: 700;
    }

    .atelier-head {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .atelier-logo {
      flex: 0 0 64px;
      width: 64px;
      height: 64px;
    }

    .atelier-logo svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .atelier-copy {
      display: grid;
      gap: 10px;
    }

    .atelier-word {
      border-top: 5px solid var(--word);
    }

    .atelier-excel {
      border-top: 5px solid var(--excel);
    }

    @media (max-width: 680px) {
      main {
        padding-top: 32px;
      }

      .atelier-list {
        grid-template-columns: 1fr;
      }

      .atelier-head {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Ateliers Bureautique</h1>
      <p>Choisissez l'atelier a ouvrir.</p>
    </header>

    <nav class="atelier-list" aria-label="Ateliers disponibles">
      <a class="atelier-link atelier-word" href="word/">
        <div class="atelier-head">
          <span class="atelier-logo" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <rect x="18" y="8" width="34" height="48" rx="6" fill="#3d74c5"/>
              <rect x="24" y="14" width="22" height="36" rx="3" fill="#ffffff" opacity="0.16"/>
              <rect x="8" y="16" width="24" height="32" rx="5" fill="#285aa8"/>
              <path d="M15 24h4l3 12 3-12h4l3 12 3-12h4l-5 16h-4l-3-11-3 11h-4z" fill="#ffffff"/>
            </svg>
          </span>
          <div class="atelier-copy">
            <span class="atelier-name">Word</span>
            <p>Exercices de traitement de texte, mise en page et documents longs.</p>
          </div>
        </div>
      </a>
      <a class="atelier-link atelier-excel" href="excel/">
        <div class="atelier-head">
          <span class="atelier-logo" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <rect x="18" y="8" width="34" height="48" rx="6" fill="#2f8e5a"/>
              <rect x="24" y="14" width="22" height="36" rx="3" fill="#ffffff" opacity="0.16"/>
              <path d="M27 14h19a3 3 0 0 1 3 3v30a3 3 0 0 1-3 3H27z" fill="#ffffff" opacity="0.12"/>
              <path d="M27 26h22M27 34h22M27 42h22M34 18v30M42 18v30" stroke="#ffffff" stroke-width="2" opacity="0.55"/>
              <rect x="8" y="16" width="24" height="32" rx="5" fill="#217a4b"/>
              <path d="m15 24 5 8-5 8h4l3-5 3 5h4l-5-8 5-8h-4l-3 5-3-5z" fill="#ffffff"/>
            </svg>
          </span>
          <div class="atelier-copy">
            <span class="atelier-name">Excel</span>
            <p>Exercices de tableur, calculs, graphiques et mise en forme.</p>
          </div>
        </div>
      </a>
    </nav>
  </main>
</body>
</html>

<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ateliers Bureautique</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #19212a;
      --muted: #5d6673;
      --line: #d9dee6;
      --paper: #f7f4ef;
      --panel: #ffffff;
      --word: #285aa8;
      --excel: #217a4b;
      --powerpoint: #d24726;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.5;
    }

    .hero-meta {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hero-meta-label {
      color: var(--muted);
      font-size: 0.98rem;
    }

    .version-chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 4px 12px;
      border: 1px solid #9fc9d8;
      border-radius: 999px;
      background: linear-gradient(180deg, #f7fdff 0%, #ebf8fd 100%);
      color: #216b84;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .version-chip:hover,
    .version-chip:focus {
      outline: 3px solid rgba(33, 107, 132, 0.18);
      outline-offset: 3px;
    }

    .atelier-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 32px;
    }

    .atelier-link {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 180px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      background: var(--panel);
    }

    .atelier-link:focus,
    .atelier-link:hover {
      outline: 3px solid rgba(25, 33, 42, 0.16);
      outline-offset: 3px;
    }

    .atelier-link[aria-disabled="true"] {
      cursor: not-allowed;
      opacity: 0.78;
    }

    .atelier-link[aria-disabled="true"]::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      padding: 10px 12px;
      border-radius: 6px;
      background: rgba(25, 33, 42, 0.94);
      color: #ffffff;
      font-size: 0.95rem;
      line-height: 1.35;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 120ms ease, transform 120ms ease;
      pointer-events: none;
    }

    .atelier-link[aria-disabled="true"]:focus::after,
    .atelier-link[aria-disabled="true"]:hover::after {
      opacity: 1;
      transform: translateY(0);
    }

    .atelier-name {
      display: block;
      font-size: 1.7rem;
      font-weight: 700;
    }

    .atelier-head {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .atelier-logo {
      flex: 0 0 64px;
      width: 64px;
      height: 64px;
    }

    .atelier-logo svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .atelier-logo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .atelier-copy {
      display: grid;
      gap: 10px;
    }

    .atelier-word {
      border-top: 5px solid var(--word);
    }

    .atelier-excel {
      border-top: 5px solid var(--excel);
    }

    .atelier-powerpoint {
      border-top: 5px solid var(--powerpoint);
    }

    @media (max-width: 680px) {
      main {
        padding-top: 32px;
      }

      .atelier-list {
        grid-template-columns: 1fr;
      }

      .atelier-head {
        align-items: flex-start;
      }
    }
  </style>
  <script defer>
    const GLOBAL_PRODUCT_VERSION_FALLBACK = "v1.0.0";

    async function loadGlobalReleaseVersion() {
      const versionNode = document.getElementById("global-version-value");
      if (!versionNode) return;

       versionNode.textContent = GLOBAL_PRODUCT_VERSION_FALLBACK;

      try {
        const response = await fetch("./releases/releases.json", { cache: "no-store" });
        if (!response.ok) throw new Error("releases.json inaccessible");
        const data = await response.json();
        const version = data?.version ? `v${data.version}` : GLOBAL_PRODUCT_VERSION_FALLBACK;
        versionNode.textContent = version;
      } catch {
        versionNode.textContent = GLOBAL_PRODUCT_VERSION_FALLBACK;
      }
    }

    window.addEventListener("DOMContentLoaded", loadGlobalReleaseVersion);
  </script>
</head>
<body>
  <main>
    <header>
      <h1>Ateliers Bureautique</h1>
      <p>Choisissez l'atelier a ouvrir.</p>
      <div class="hero-meta">
        <span class="hero-meta-label">Version produit</span>
        <a class="version-chip" href="./releases/" aria-label="Ouvrir l'historique des releases globales" title="Voir l'historique des releases">
          <span id="global-version-value">v1.0.0</span>
        </a>
      </div>
    </header>

    <nav class="atelier-list" aria-label="Ateliers disponibles">
      <a class="atelier-link atelier-word" href="word/">
        <div class="atelier-head">
          <span class="atelier-logo" aria-hidden="true">
            <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Microsoft%20Office%20Word%20%282025%E2%80%93present%29.svg" alt="">
          </span>
          <div class="atelier-copy">
            <span class="atelier-name">Word</span>
            <p>Exercices de traitement de texte, mise en page et documents longs.</p>
          </div>
        </div>
      </a>
      <a class="atelier-link atelier-excel" href="excel/">
        <div class="atelier-head">
          <span class="atelier-logo" aria-hidden="true">
            <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Microsoft%20Office%20Excel%20%282025%E2%80%93present%29.svg" alt="">
          </span>
          <div class="atelier-copy">
            <span class="atelier-name">Excel</span>
            <p>Exercices de tableur, calculs, graphiques et mise en forme.</p>
          </div>
        </div>
      </a>
      <div
        class="atelier-link atelier-powerpoint"
        role="link"
        aria-disabled="true"
        tabindex="0"
        data-tooltip="Bientot disponible... l'atelier PowerPoint est en preparation."
      >
        <div class="atelier-head">
          <span class="atelier-logo" aria-hidden="true">
            <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Microsoft%20Office%20PowerPoint%20%282025%E2%80%93present%29.svg" alt="">
          </span>
          <div class="atelier-copy">
            <span class="atelier-name">PowerPoint</span>
            <p>Exercices de presentations, diapositives, animations et mise en page.</p>
          </div>
        </div>
      </div>
    </nav>
  </main>
</body>
</html>
